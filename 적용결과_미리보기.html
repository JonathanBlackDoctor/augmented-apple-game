<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>적용 결과 — HTML 그대로 (원형·평면·drop-shadow)</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#FBF5E9,#F4EDDF);color:#3A2A1E;
    font-family:-apple-system,sans-serif;padding:24px 22px 60px;}
  h1{font-size:21px;margin:0 0 4px;}
  .lead{font-size:13px;color:#7a6552;max-width:78ch;line-height:1.6;margin:0 0 18px;}
  .lead b{color:#E04A36;}
  .card{display:inline-block;background:#fffdf7;border:1px solid #ecdfc9;border-radius:14px;padding:18px 22px;margin:0 18px 18px 0;vertical-align:top;}
  .card h2{font-size:13px;margin:0 0 12px;}
  .pair{display:flex;gap:34px;align-items:flex-end;}
  .cap{font-size:11px;color:#9a8472;margin-top:8px;text-align:center;font-weight:700;}
  .grid{display:grid;grid-template-columns:repeat(6,52px);gap:7px;background:#fbe7d8;padding:12px;border-radius:10px;}
  .row{display:flex;gap:22px;align-items:flex-end;}

  /* ── 보내주신 HTML 의 사과(CSS) — 비교 기준 ── */
  .apple{position:relative;display:inline-block;--ap:150px;width:var(--ap);height:var(--ap);}
  .apple .fruit{position:absolute;inset:0;z-index:2;border-radius:50%;
    background:radial-gradient(72% 60% at 50% 30%,#ED6138,#E5512C 56%,#DC4824);
    filter:drop-shadow(0 1.5px 2px rgba(40,18,12,.28));}
  .apple .num{position:absolute;inset:0;z-index:7;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:calc(var(--ap)*0.46);color:#FFF4EC;
    font-family:-apple-system,sans-serif;text-shadow:0 1px 1.5px rgba(120,30,16,.36);}
  .apple .stem{position:absolute;z-index:3;top:-10%;left:47.5%;width:7.5%;height:24%;border-radius:40%;
    background:linear-gradient(#7C4B2B,#5C3620);transform:rotate(11deg);transform-origin:bottom center;}
  .apple .leaf{position:absolute;z-index:4;border-radius:0 100% 0 100%;
    box-shadow:inset -1px -1px 1.5px rgba(0,0,0,.18);background:linear-gradient(150deg,#69B23A,#4C9626);
    top:-26%;left:24%;width:28%;height:28%;transform:rotate(-38deg);transform-origin:bottom right;}
</style>
</head>
<body>
  <h1>🍎 적용 결과 — 보내주신 HTML 그대로</h1>
  <p class="lead">
    왼쪽은 <b>보내주신 HTML(CSS)</b>, 오른쪽은 <b>게임 렌더러 candyApple.ts 최종 코드를 그대로 옮긴 캔버스</b>입니다.
    원형 본체·평면 radial·drop-shadow·잎/꼭지·숫자(800)까지 동일해야 합니다. (조명/낮밤 제거된 정적 평면)
  </p>

  <div class="card">
    <h2>나란히 비교 (150px)</h2>
    <div class="pair">
      <div>
        <div class="apple"><span class="fruit"></span><span class="stem"></span><span class="leaf"></span><span class="num">3</span></div>
        <div class="cap">보내주신 HTML (CSS)</div>
      </div>
      <div>
        <div id="canvasBig"></div>
        <div class="cap">게임 렌더러 (canvas)</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>게임 셀 52px (normal)</h2>
    <div class="grid" id="grid"></div>
  </div>

  <div class="card">
    <h2>증강 변형 (130px · 같은 평면 파이프라인)</h2>
    <div class="row" id="variants"></div>
  </div>

<script>
// ── candyApple.ts 최종(평면 원형) 로직 이식 ──────────────────────────────
const VARIANTS={
 normal:{palette:['#ED6138','#E5512C','#DC4824'],number:'#FFF4EC',leaf:['#69B23A','#4C9626'],stem:['#7C4B2B','#5C3620']},
 golden:{palette:['#f4c659','#dca21f','#ad7d13'],number:'#5a3c08',leaf:['#cdd07a','#9aa24e'],stem:['#8a5630','#5f3a1f']},
 wild:{palette:['#9e92ff','#7d6df0','#5f4cd6'],number:'#ffffff',rainbow:true,leaf:['#9fe6c4','#56b78c'],stem:['#6a5cc0','#473a90']},
 gem:{palette:['#6fe3e0','#2bb6c8','#1c7e96'],number:'#eafdff',leaf:['#9ee0d8','#4fb3ad'],stem:['#3a7d70','#1f5048']},
 bomb:{palette:['#6a6f86','#454a63','#2a2e44'],number:'#f2f2f6',fuse:true,leaf:['#9bbf7e','#6f9a52'],stem:['#5a5060','#3a3340']},
};
function radialFill(ctx,cx,cy,rx,ry,stops){ctx.save();ctx.translate(cx,cy);ctx.scale(rx,ry);const g=ctx.createRadialGradient(0,0,0,0,0,1);for(const[o,c]of stops)g.addColorStop(o,c);ctx.fillStyle=g;ctx.fillRect(-300,-300,600,600);ctx.restore();}
function drawFuse(ctx){ctx.strokeStyle='#8a6a40';ctx.lineWidth=3.4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(50,14);ctx.quadraticCurveTo(54,6,62,8);ctx.stroke();const tx=62,ty=8;const gg=ctx.createRadialGradient(tx,ty,0,tx,ty,7);gg.addColorStop(0,'rgba(255,255,255,0.95)');gg.addColorStop(0.5,'rgba(255,181,58,0.7)');gg.addColorStop(1,'rgba(255,181,58,0)');ctx.fillStyle=gg;ctx.beginPath();ctx.arc(tx,ty,7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff3c4';const r=6;ctx.beginPath();ctx.moveTo(tx,ty-r);ctx.lineTo(tx+r*0.3,ty);ctx.lineTo(tx,ty+r);ctx.lineTo(tx-r*0.3,ty);ctx.closePath();ctx.moveTo(tx-r,ty);ctx.lineTo(tx,ty-r*0.3);ctx.lineTo(tx+r,ty);ctx.lineTo(tx,ty+r*0.3);ctx.closePath();ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(tx,ty,1.8,0,Math.PI*2);ctx.fill();}
function drawStemLeaf(ctx,v,s){
  ctx.save();ctx.scale(s,s);
  if(v.fuse){drawFuse(ctx);ctx.restore();return;}
  ctx.save();ctx.translate(51.25,14);ctx.rotate(11*Math.PI/180);
  const sw=7.5,sh=24;const sg=ctx.createLinearGradient(0,-sh,0,0);sg.addColorStop(0,v.stem[0]);sg.addColorStop(1,v.stem[1]);ctx.fillStyle=sg;
  ctx.beginPath();ctx.roundRect(-sw/2,-sh,sw,sh,sw*0.4);ctx.fill();ctx.restore();
  ctx.save();ctx.translate(52,2);ctx.rotate(-38*Math.PI/180);
  const lw=28,lh=28;
  ctx.beginPath();ctx.moveTo(-lw,-lh);ctx.quadraticCurveTo(0,-lh,0,0);ctx.quadraticCurveTo(-lw,0,-lw,-lh);ctx.closePath();
  const lg=ctx.createLinearGradient(0,-lh,-lw,0);lg.addColorStop(0,v.leaf[0]);lg.addColorStop(1,v.leaf[1]);ctx.fillStyle=lg;ctx.fill();
  ctx.clip();const ish=ctx.createRadialGradient(0,0,0,0,0,lw*0.55);ish.addColorStop(0,'rgba(0,0,0,0.18)');ish.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=ish;ctx.fillRect(-lw,-lh,lw,lh);ctx.restore();
  ctx.restore();
}
function drawApple(ctx,opt){
  const{size,value}=opt;const v=VARIANTS[opt.variant||'normal'];const showDeco=opt.decorations??size>24;const s=size/100;
  const cx=size*0.5,cy=size*0.5,r=size*0.5;
  // drop-shadow(0 1.5px 2px rgba(40,18,12,.28))
  ctx.save();ctx.shadowColor='rgba(40,18,12,0.28)';ctx.shadowOffsetX=0;ctx.shadowOffsetY=size*0.01;ctx.shadowBlur=size*0.0133;
  ctx.fillStyle=v.palette[2];ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();ctx.restore();
  // 원형 본체 + 평면 radial
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();ctx.scale(s,s);
  if(v.rainbow){const rad=176*Math.PI/180,dx=Math.cos(rad),dy=Math.sin(rad);const g1=ctx.createLinearGradient(50-dx*50,50-dy*50,50+dx*50,50+dy*50);g1.addColorStop(0,'#ff9ec4');g1.addColorStop(0.25,'#ffe08a');g1.addColorStop(0.5,'#8fe6c8');g1.addColorStop(0.72,'#7fc4f0');g1.addColorStop(1,'#b3a8ff');ctx.fillStyle=g1;ctx.fillRect(0,0,100,100);}
  else{radialFill(ctx,50,30,72,60,[[0,v.palette[0]],[0.56,v.palette[1]],[1,v.palette[2]]]);}
  ctx.restore();
  if(showDeco)drawStemLeaf(ctx,v,s);
  if(value!=null){const small=size<=24,ratio=small?0.52:0.46;ctx.fillStyle=v.number;ctx.font=`800 ${size*ratio}px Quicksand,"Pretendard Variable",Pretendard,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(120,30,16,0.36)';ctx.shadowBlur=small?size*0.04:size*0.05;ctx.shadowOffsetY=small?1.5:2;ctx.fillText(String(value),size*0.5,size*0.52);}
}
function mk(size,value,variant){const dpr=Math.min(window.devicePixelRatio||1,2);const c=document.createElement('canvas');c.width=size*dpr;c.height=size*dpr;c.style.width=size+'px';c.style.height=size+'px';const ctx=c.getContext('2d');ctx.scale(dpr,dpr);drawApple(ctx,{size,value,variant});return c;}

document.getElementById('canvasBig').appendChild(mk(150,3,'normal'));
const g=document.getElementById('grid');const nums=[3,7,1,9,2,5,4,8,6,1,3,2,9,5,7,4,6,8];
for(let i=0;i<18;i++){const w=document.createElement('div');w.style.cssText='position:relative;width:52px;height:52px;outline:1px dashed rgba(224,74,54,.30)';w.appendChild(mk(52,nums[i],'normal'));g.appendChild(w);}
const vr=document.getElementById('variants');
[['normal',3],['golden',5],['wild',7],['gem',2],['bomb',9]].forEach(([variant,n])=>{const col=document.createElement('div');col.appendChild(mk(130,n,variant));const cap=document.createElement('div');cap.className='cap';cap.textContent=variant;col.appendChild(cap);vr.appendChild(col);});
</script>
</body>
</html>
